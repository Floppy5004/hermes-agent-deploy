version: '3.8'

services:
  hermes-core:
    build: 
      context: ./hermes-agent
      dockerfile: Dockerfile 
    container_name: hermes-core
    restart: always
    user: "1000:1000"
    env_file: .env
    volumes:
      - ./config:/app/config
      - hermes_data:/app/data
    depends_on:
      - memory-db
    networks:
      - hermes-net
      - backend-net

  memory-db:
    image: chromadb/chroma:latest
    container_name: memory-db
    restart: always
    user: "1000:1000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - backend-net

  discord-bridge:
    build:
      context: ./hermes-agent-bridges/discord
    container_name: discord-bridge
    restart: always
    user: "1000:1000"
    env_file: .env
    networks:
      - hermes-net

  telegram-bridge:
    build:
      context: ./hermes-agent-bridges/telegram
    container_name: telegram-bridge
    restart: always
    user: "1000:1000"
    env_file: .env
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge
  backend-net:
    internal: true

volumes:
  hermes_data:
  chroma_data:
